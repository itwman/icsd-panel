<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ICSD Panel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1419;--panel:#1a212b;--panel2:#222b38;--text:#e6edf3;--muted:#8b97a7;
    --line:#2c3743;--accent:#12a28e;--accent2:#1ad1b5;--warn:#e0a800;--danger:#e5484d;--r:14px}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:"Vazirmatn","Segoe UI",Tahoma,sans-serif}
  html[dir=ltr] body{font-family:"Segoe UI",system-ui,sans-serif}
  a{color:var(--accent2)}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;
    padding:8px 14px;cursor:pointer;font-family:inherit;font-size:13px}
  button:hover{border-color:var(--accent)}
  button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04130d;border:none;font-weight:700}
  button.danger{border-color:var(--danger);color:#ff9ca0}
  input,select{background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;font-family:inherit;font-size:13px;width:100%}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  .hidden{display:none!important}
  /* layout */
  #app{display:flex;min-height:100vh}
  aside{width:230px;background:var(--panel);border-inline-end:1px solid var(--line);padding:16px;flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .logo{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
  .logo img,.logo svg{width:100%;height:100%;object-fit:contain;display:block}
  nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:var(--text);
    text-decoration:none;font-size:14px;margin-bottom:4px;cursor:pointer}
  nav a:hover{background:var(--panel2)}
  nav a.active{background:var(--panel2);color:var(--accent2);font-weight:700}
  main{flex:1;padding:24px;max-width:1100px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}
  .card h3{margin:0 0 4px;font-size:13px;color:var(--muted);font-weight:600}
  .stat{font-size:28px;font-weight:800;margin:6px 0}.stat small{font-size:13px;color:var(--muted)}
  .bar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-top:10px}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
  .bar.warn>span{background:linear-gradient(90deg,var(--warn),#f7c948)}
  .bar.danger>span{background:linear-gradient(90deg,var(--danger),#ff7a7d)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:start;padding:10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  .pill{font-size:11px;padding:3px 9px;border-radius:99px}
  .pill.up{background:rgba(45,212,167,.15);color:var(--accent2)}
  .pill.down{background:rgba(229,72,77,.15);color:var(--danger)}
  .muted{color:var(--muted)}
  .toast{position:fixed;inset-block-end:20px;inset-inline-end:20px;background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;padding:12px 16px;font-size:13px;max-width:340px;z-index:99}
  .toast.err{border-color:var(--danger)}.toast.ok{border-color:var(--accent)}
  pre{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:12px;overflow:auto;font-size:12px;max-height:280px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:grid;place-items:center;z-index:50}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;width:min(520px,92vw);max-height:88vh;overflow:auto}
  /* login */
  #login{display:grid;place-items:center;min-height:100vh;width:100%}
  .loginbox{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:32px;width:min(380px,92vw)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="loginbox">
    <div class="brand" style="justify-content:center"><div class="logo"><img src="/static/logo/icsd-logo-1.svg" alt="ICSD"></div>
      <div><b data-i18n="title">پنل مدیریت سرور ICSD</b><br><small class="muted" data-i18n="subtitle">توسعه هوشمند فرش ایرانیان</small></div></div>
    <label data-i18n="username">نام کاربری</label><input id="li_user" value="admin" autocomplete="username">
    <label data-i18n="password">رمز عبور</label><input id="li_pass" type="password" autocomplete="current-password">
    <label data-i18n="otp">کد ۲مرحله‌ای (در صورت فعال بودن)</label><input id="li_otp" inputmode="numeric" placeholder="------">
    <button class="primary" style="width:100%;margin-top:18px" onclick="doLogin()" data-i18n="login">ورود</button>
    <div style="text-align:center;margin-top:14px"><button onclick="toggleLang()" id="li_lang">EN</button></div>
    <p class="muted" style="font-size:11px;margin-top:14px" data-i18n="defcred">پیش‌فرض: admin / admin12345 — پس از ورود حتماً تغییر دهید</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside>
    <div class="brand"><div class="logo"><img src="/static/logo/icsd-logo-1.svg" alt="ICSD"></div><div><b style="font-size:15px">ICSD Panel</b></div></div>
    <nav id="nav">
      <a data-view="dashboard" class="active">📊 <span data-i18n="nav_dash">داشبورد</span></a>
      <a data-view="sites">🌐 <span data-i18n="nav_sites">سایت‌ها</span></a>
      <a data-view="files">📁 <span data-i18n="nav_files">فایل‌ها</span></a>
      <a data-view="ftp">🔌 <span data-i18n="nav_ftp">حساب‌های FTP</span></a>
      <a data-view="databases">🗄️ <span data-i18n="nav_db">دیتابیس‌ها</span></a>
      <a data-view="apps">🧩 <span data-i18n="nav_apps">برنامه‌ها</span></a>
      <a data-view="pyapps">🐍 <span data-i18n="nav_pyapps">پایتون/جنگو</span></a>
      <a data-view="ssl">🔒 <span data-i18n="nav_ssl">گواهی SSL</span></a>
      <a data-view="email">✉️ <span data-i18n="nav_email">ایمیل</span></a>
      <a data-view="security">🛡️ <span data-i18n="nav_sec">امنیت</span></a>
      <a data-view="logs">📜 <span data-i18n="nav_logs">لاگ‌ها</span></a>
      <a data-view="cron">⏰ <span data-i18n="nav_cron">کرون‌جاب</span></a>
      <a data-view="backups">💾 <span data-i18n="nav_bk">بک‌آپ‌ها</span></a>
      <a data-view="settings">⚙️ <span data-i18n="nav_settings">تنظیمات</span></a>
    </nav>
    <div style="margin-top:24px;border-top:1px solid var(--line);padding-top:16px">
      <button onclick="changePwForm()" style="width:100%;margin-bottom:8px">🔑 <span data-i18n="changepw">تغییر رمز عبور</span></button>
      <button onclick="toggleLang()" id="lang" style="width:100%;margin-bottom:8px">English</button>
      <button class="danger" onclick="logout()" style="width:100%" data-i18n="logout">خروج</button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <h2 id="viewTitle" style="margin:0">داشبورد</h2>
      <span class="muted" id="whoami"></span>
    </div>
    <div id="views"></div>
  </main>
</div>

let lang=localStorage.getItem("icsd_lang")||"fa";
function t(k){return T[lang][k]||k}
function applyLang(){document.documentElement.lang=lang;document.documentElement.dir=lang==="fa"?"rtl":"ltr";
  document.querySelectorAll("[data-i18n]").forEach(e=>{const k=e.getAttribute("data-i18n");if(T[lang][k])e.textContent=T[lang][k]});
  document.getElementById("lang").textContent=lang==="fa"?"English":"فارسی";
  document.getElementById("li_lang").textContent=lang==="fa"?"EN":"فا";
  if(token&&currentView)render(currentView)}
function toggleLang(){lang=lang==="fa"?"en":"fa";localStorage.setItem("icsd_lang",lang);applyLang()}

// ---------------- auth + api ----------------
let token=localStorage.getItem("icsd_token")||null, currentView="dashboard", chart, ws;
function toast(msg,kind){const d=document.createElement("div");d.className="toast "+(kind||"");d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),4200)}
async function api(path,opts={}){
  opts.headers=Object.assign({"Content-Type":"application/json"},opts.headers||{});
  if(token)opts.headers["Authorization"]="Bearer "+token;
  const r=await fetch(path,opts);
  if(r.status===401){logout();throw new Error("unauthorized")}
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.detail||("HTTP "+r.status));
  return data}
async function doLogin(){
  try{const r=await api("/api/auth/login",{method:"POST",body:JSON.stringify({
    username:document.getElementById("li_user").value,password:document.getElementById("li_pass").value,
    otp:document.getElementById("li_otp").value||null})});
    token=r.access_token;localStorage.setItem("icsd_token",token);showApp(r.user)}
  catch(e){toast(e.message,"err")}}
function logout(){token=null;localStorage.removeItem("icsd_token");if(ws)try{ws.close()}catch(e){}
  document.getElementById("app").classList.add("hidden");document.getElementById("login").classList.remove("hidden")}
async function showApp(user){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  if(!user){try{user=await api("/api/auth/me")}catch(e){return}}
  document.getElementById("whoami").textContent=`${user.username} · ${user.role}`+(user.totp_enabled?" · 🔐":"");
  setView("dashboard");
  try{const st=await api("/api/setup/status");if(st.steps&&!st.steps.wizard_done)openWizard()}catch(e){}}

// ---------------- views ----------------

function fmtB(b){if(b==null)return"—";const u=["B","KB","MB","GB","TB"];let i=0;while(b>=1024&&i<u.length-1){b/=1024;i++}return b.toFixed(1)+" "+u[i]}
function fmtUp(s){const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);return(d?d+"d ":"")+h+"h "+m+"m"}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

async function loadHistory(){try{const r=await api("/api/monitoring/history?hours=24");

function paint(d){$("cpu").textContent=d.cpu.percent.toFixed(0);setBar("cpuBar",d.cpu.percent);
  $("mem").textContent=d.memory.percent.toFixed(0);setBar("memBar",d.memory.percent);
  $("memU").textContent=fmtB(d.memory.used);$("memT").textContent=fmtB(d.memory.total);
  $("up").textContent=fmtB(d.network.up_bytes_per_sec)+"/s";$("dn").textContent=fmtB(d.network.down_bytes_per_sec)+"/s";
  $("uptime").textContent=fmtUp(d.uptime_seconds);
  $("disks").innerHTML=d.disk.map(p=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)"><span>${esc(p.mountpoint)} <span class="muted">(${esc(p.fstype)})</span></span><span>${fmtB(p.used)}/${fmtB(p.total)} — ${p.percent}%</span></div>`).join("")||"—";
  if(chart){chart.data.datasets[0].data.push(d.cpu.percent);chart.data.datasets[1].data.push(d.memory.percent);
    chart.data.datasets[0].data.shift();chart.data.datasets[1].data.shift();chart.update()}}
function setBar(id,p){const b=$(id);if(!b)return;b.className="bar"+(p>=90?" danger":p>=70?" warn":"");b.firstElementChild.style.width=p+"%"}
function connectWS(){const proto=location.protocol==="https:"?"wss":"ws";
  try{ws=new WebSocket(`${proto}://${location.host}/api/monitoring/ws`)}catch(e){return pollFallback()}
  ws.onmessage=e=>{if(currentView==="dashboard")paint(JSON.parse(e.data))};
  ws.onclose=()=>{if(currentView==="dashboard")setTimeout(connectWS,3000)};ws.onerror=()=>{try{ws.close()}catch(e){}}}

// path-safe escape for inline JS string args (handles \ and ' then HTML-escapes)

let fmPath=null;
async function viewFiles(){
  $("views").innerHTML=`<div class="card" style="margin-bottom:12px"><div id="fmRoots" class="muted">…</div></div>
    <div class="card"><div id="fmBar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px"></div>
    <div id="fmList">…</div><input type="file" id="fmFile" style="display:none" onchange="fmUpload(this)"></div>`;
  try{const r=await api("/api/files/roots");
    $("fmRoots").innerHTML=r.roots.length?r.roots.map(x=>`<button onclick="fmOpen('${pesc(x.path)}')">📁 ${esc(x.name||x.path)}</button>`).join(" "):t("none");
    if((!fmPath)&&r.roots.length)fmPath=r.roots[0].path;
    if(fmPath)fmOpen(fmPath);else $("fmList").innerHTML=`<p class="muted">${t("none")}</p>`}
  catch(e){toast(e.message,"err")}}
async function fmOpen(p){fmPath=p;try{const r=await api("/api/files/list?path="+encodeURIComponent(p));
  $("fmBar").innerHTML=`<code style="flex:1;min-width:160px">${esc(r.path)}</code>`+
    (r.parent?`<button onclick="fmOpen('${pesc(r.parent)}')">⬆ ${t("back")}</button>`:"")+
    `<button onclick="$('fmFile').click()">⬆ ${t("upload")}</button>`+
    `<button onclick="fmNew('mkdir')">+ ${t("newfolder")}</button><button onclick="fmNew('new')">+ ${t("newfile")}</button>`;
  $("fmList").innerHTML=`<table><thead><tr><th>نام / Name</th><th>${t("size")}</th><th>${t("modified")}</th><th>${t("perms")}</th><th>${t("actions")}</th></tr></thead><tbody>`+
    (r.entries.length?r.entries.map(fmRow).join(""):`<tr><td colspan="5" class="muted">${t("none")}</td></tr>`)+`</tbody></table>`}
  catch(e){toast(e.message,"err")}}
function fmRow(x){const icon=x.is_dir?"📁":"📄";
  const name=x.is_dir?`<a style="cursor:pointer" onclick="fmOpen('${pesc(x.path)}')">${icon} ${esc(x.name)}</a>`:`${icon} ${esc(x.name)}`;
  let act="";
  if(!x.is_dir){act+=`<button onclick="fmDownload('${pesc(x.path)}')">${t("download")}</button>`;
    if(x.editable)act+=`<button onclick="fmEdit('${pesc(x.path)}')">${t("edit")}</button>`;
    if(/\.(zip|tar|gz|tgz)$/i.test(x.name))act+=`<button onclick="fmExtract('${pesc(x.path)}')">${t("extract")}</button>`}
  act+=`<button onclick="fmRename('${pesc(x.path)}','${pesc(x.name)}')">${t("rename")}</button>`;
  act+=`<button class="danger" onclick="fmDelete('${pesc(x.path)}')">${t("del")}</button>`;
  return `<tr><td>${name}</td><td class="muted">${x.is_dir?"—":fmtB(x.size)}</td><td class="muted" style="font-size:12px">${esc(x.modified||"")}</td><td class="muted" style="font-size:12px">${esc(x.mode||"")}</td><td>${act}</td></tr>`}
async function fmUpload(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append("dir_path",fmPath);fd.append("file",f);
  try{const r=await fetch("/api/files/upload",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd});
    const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||"HTTP "+r.status);toast(t("saved"),"ok");inp.value="";fmOpen(fmPath)}
  catch(e){toast(e.message,"err")}}
async function fmNew(kind){const n=prompt(kind==="mkdir"?t("newfolder"):t("newfile"));if(!n)return;
  try{await api("/api/files/"+kind,{method:"POST",body:JSON.stringify({path:fmPath.replace(/\/+$/,"")+"/"+n})});fmOpen(fmPath)}catch(e){toast(e.message,"err")}}
async function fmRename(p,old){const n=prompt(t("rename"),old);if(!n||n===old)return;
  try{await api("/api/files/rename",{method:"POST",body:JSON.stringify({path:p,new_name:n})});fmOpen(fmPath)}catch(e){toast(e.message,"err")}}
async function fmDelete(p){if(!confirm(t("confirmdel")+"\n"+p))return;
  try{await api("/api/files/delete",{method:"POST",body:JSON.stringify({path:p})});fmOpen(fmPath)}catch(e){toast(e.message,"err")}}
async function fmExtract(p){if(!confirm(t("extract")+"؟"))return;
  try{const r=await api("/api/files/extract",{method:"POST",body:JSON.stringify({path:p})});toast(t("done")+" ("+r.extracted+")","ok");fmOpen(fmPath)}catch(e){toast(e.message,"err")}}
async function fmDownload(p){try{const r=await fetch("/api/files/download?path="+encodeURIComponent(p),{headers:{Authorization:"Bearer "+token}});
  if(!r.ok)throw new Error("HTTP "+r.status);const b=await r.blob();const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=p.split("/").pop();a.click();URL.revokeObjectURL(u)}catch(e){toast(e.message,"err")}}
async function fmEdit(p){try{const r=await api("/api/files/read?path="+encodeURIComponent(p));
  modal(`<h3>${t("edit")}: ${esc(p.split("/").pop())}</h3><textarea id="fmEd" style="width:100%;height:48vh;font-family:monospace;font-size:13px;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:10px"></textarea><div style="margin-top:12px"><button class="primary" onclick="fmSave('${pesc(p)}')">${t("save")}</button></div>`);
  $("fmEd").value=r.content}catch(e){toast(e.message,"err")}}

async function doRestore(id,archive){if(!confirm(t("restorewarn")))return;
  try{const r=await api(`/api/backups/${id}/restore`,{method:"POST",body:JSON.stringify({archive})});closeModal();toast("OK: "+(r.restored_to||t("done")),"ok")}catch(e){toast(e.message,"err")}}

// ---- FTP accounts ----
async function viewFtp(){
  $("views").innerHTML=`<div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap"><button class="primary" onclick="ftpForm()">+ ${t("addftp")}</button><span id="ftpSrv" class="muted" style="font-size:12px"></span></div></div><div class="card"><div id="ftpList">…</div></div>`;
  try{const j=await api("/api/ftp");
    $("ftpSrv").textContent=j.server.installed?("✓ "+(j.server.vsftpd?"vsftpd":"pure-ftpd")):(j.server.hint||"");
    $("ftpList").innerHTML=j.accounts.length?`<table><thead><tr><th>${t("ftpuser")}</th><th>${t("homedir")}</th><th>${t("status")}</th><th>${t("actions")}</th></tr></thead><tbody>`+
      j.accounts.map(a=>`<tr><td>${esc(a.username)}</td><td class="muted">${esc(a.home_dir)}</td>
        <td><span class="pill ${a.active?"up":"down"}">${a.active?t("active"):t("locked")}</span></td>
        <td><button onclick="ftpPass('${pesc(a.username)}')">${t("changepass")}</button>
        <button onclick="ftpActive('${pesc(a.username)}',${a.active?0:1})">${a.active?t("lock"):t("unlock")}</button>
        <button class="danger" onclick="ftpDel('${pesc(a.username)}')">${t("del")}</button></td></tr>`).join("")+`</tbody></table>`:`<p class="muted">${t("none")}</p>`}
  catch(e){toast(e.message,"err")}}
function ftpForm(){modal(`<h3>${t("addftp")}</h3><label>${t("ftpuser")}</label><input id="f_user" placeholder="siteuser">
  <label>${t("password")}</label><input id="f_pass" type="password">
  <label>${t("homedir")}</label><input id="f_home" placeholder="/var/www/example.ir">
  <div style="margin-top:14px"><button class="primary" onclick="ftpCreate()">${t("create")}</button></div>`)}
async function ftpCreate(){try{await api("/api/ftp",{method:"POST",body:JSON.stringify({username:$("f_user").value,password:$("f_pass").value,home_dir:$("f_home").value})});closeModal();toast(t("saved"),"ok");viewFtp()}catch(e){toast(e.message,"err")}}
async function ftpPass(u){const p=prompt(t("changepass"));if(!p)return;try{await api(`/api/ftp/${u}/password`,{method:"POST",body:JSON.stringify({password:p})});toast(t("saved"),"ok")}catch(e){toast(e.message,"err")}}
async function ftpActive(u,act){try{await api(`/api/ftp/${u}/active`,{method:"POST",body:JSON.stringify({active:!!act})});viewFtp()}catch(e){toast(e.message,"err")}}
async function ftpDel(u){if(!confirm(t("confirmdel")+" "+u))return;const rm=confirm(t("removehome"));
  try{await api(`/api/ftp/${u}?remove_home=${rm}`,{method:"DELETE"});viewFtp()}catch(e){toast(e.message,"err")}}

// ---- Cron jobs ----
let cronUsers=[];
async function viewCron(){
  $("views").innerHTML=`<div class="card" style="margin-bottom:16px"><button class="primary" onclick="cronForm()">+ ${t("addcron")}</button> <span class="muted" style="font-size:12px">${t("cronhint")}</span></div><div class="card"><div id="cronList">…</div></div>`;
  try{const j=await api("/api/cron");cronUsers=j.users;
    $("cronList").innerHTML=j.jobs.length?`<table><thead><tr><th>${t("cronuser")}</th><th>${t("schedule")}</th><th>${t("command")}</th><th>${t("status")}</th><th>${t("actions")}</th></tr></thead><tbody>`+
      j.jobs.map(c=>`<tr><td>${esc(c.cron_user)}</td><td><code>${esc(c.schedule)}</code></td><td class="muted" style="font-size:12px">${esc(c.command)}${c.comment?` <span class="muted">— ${esc(c.comment)}</span>`:""}</td>
        <td><span class="pill ${c.enabled?"up":"down"}">${c.enabled?t("active"):t("disable")}</span></td>
        <td><button onclick="cronToggle(${c.id},${c.enabled?0:1})">${t("enabledis")}</button><button class="danger" onclick="cronDel(${c.id})">${t("del")}</button></td></tr>`).join("")+`</tbody></table>`:`<p class="muted">${t("none")}</p>`}
  catch(e){toast(e.message,"err")}}
function cronForm(){modal(`<h3>${t("addcron")}</h3>
  <label>${t("cronuser")}</label><select id="c_user">${cronUsers.map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join("")}</select>
  <label>${t("schedule")}</label><input id="c_sched" placeholder="0 3 * * *" value="0 3 * * *">
  <label>${t("command")}</label><input id="c_cmd" placeholder="/usr/bin/php /var/www/site/cron.php">
  <label>${t("comment")}</label><input id="c_comment">
  <p class="muted" style="font-size:12px">${t("cronhint")}</p>
  <div style="margin-top:14px"><button class="primary" onclick="cronCreate()">${t("create")}</button></div>`)}
async function cronCreate(){try{await api("/api/cron",{method:"POST",body:JSON.stringify({cron_user:$("c_user").value,schedule:$("c_sched").value,command:$("c_cmd").value,comment:$("c_comment").value})});closeModal();toast(t("saved"),"ok");viewCron()}catch(e){toast(e.message,"err")}}
async function cronToggle(id,en){try{await api(`/api/cron/${id}/enabled`,{method:"POST",body:JSON.stringify({enabled:!!en})});viewCron()}catch(e){toast(e.message,"err")}}
async function cronDel(id){if(!confirm(t("confirmdel")))return;try{await api(`/api/cron/${id}`,{method:"DELETE"});viewCron()}catch(e){toast(e.message,"err")}}

// ---- Webmail (Roundcube) ----
function webmailForm(){modal(`<h3>${t("installwebmail")}</h3><label>${t("domain")}</label><input id="wm_domain" placeholder="mail.example.ir">
  <div class="row2"><div><label>${t("imaphost")}</label><input id="wm_imap" value="localhost"></div><div><label>${t("smtphost")}</label><input id="wm_smtp" value="localhost"></div></div>
  <p class="muted" style="font-size:12px">دانلود و نصب روی سرور انجام می‌شود (نیازمند دیتابیس و شبکه).</p>
  <div style="margin-top:14px"><button class="primary" onclick="installWebmail()">${t("install")}</button></div>`)}
async function installWebmail(){try{const r=await api("/api/webmail",{method:"POST",body:JSON.stringify({domain:$("wm_domain").value,imap_host:$("wm_imap").value,smtp_host:$("wm_smtp").value})});
  closeModal();alert("OK: "+JSON.stringify(r,null,1))}catch(e){toast(e.message,"err")}}

// ---- Python / Django apps ----
async function viewPyapps(){
  $("views").innerHTML=`<div class="card" style="margin-bottom:16px"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><button class="primary" onclick="pyForm()">+ ${t("deployapp")}</button><button onclick="pyTemplateForm()">⚡ ${t("fromtemplate")}</button> <span class="muted" style="font-size:12px">${t("pyapphint")}</span></div></div><div class="card"><div id="pyList">…</div></div>`;
  try{const j=await api("/api/pyapps");
    $("pyList").innerHTML=j.apps.length?`<table><thead><tr><th>${t("reponame")}</th><th>${t("domain")}</th><th>${t("apptype")}</th><th>${t("port")}</th><th>${t("status")}</th><th>${t("actions")}</th></tr></thead><tbody>`+
      j.apps.map(a=>`<tr><td><b>${esc(a.name)}</b></td><td class="muted">${esc(a.domain||"—")}</td><td>${esc(a.app_type)}</td><td class="muted">${a.port}</td>
        <td><span class="pill ${(a.last_status||"").includes("fail")?"down":"up"}">${esc(a.last_status||"—")}</span></td>
        <td><button class="primary" onclick="pyDeploy(${a.id})">${t("redeploy")}</button>
        <button onclick="pyWebhook(${a.id})">🔗 ${t("ghwebhook")}</button>
        <button onclick="pyCtl(${a.id},'restart')">${t("restart")}</button>
        <button onclick="pyCtl(${a.id},'stop')">${t("stop")}</button>
        <button onclick="pyLogs(${a.id})">${t("applogs")}</button>
        <button class="danger" onclick="pyDel(${a.id})">${t("del")}</button></td></tr>`).join("")+`</tbody></table>`:`<p class="muted">${t("none")}</p>`}
  catch(e){toast(e.message,"err")}}
function pyForm(){modal(`<h3>${t("deployapp")}</h3>
  <div class="row2"><div><label>${t("reponame")}</label><input id="py_name" placeholder="myblog"></div><div><label>${t("domain")}</label><input id="py_domain" placeholder="blog.example.ir"></div></div>
  <label>${t("repourl")}</label><input id="py_repo" placeholder="https://github.com/user/repo.git">
  <div class="row2"><div><label>${t("branch")}</label><input id="py_branch" value="main"></div><div><label>${t("apptype")}</label><select id="py_type"><option value="django">Django</option><option value="wsgi">WSGI (Flask…)</option><option value="asgi">ASGI (FastAPI…)</option></select></div></div>
  <label>${t("entrypoint")}</label><input id="py_entry" placeholder="myproject.wsgi:application">
  <label>${t("pyver")}</label><input id="py_ver" placeholder="3.11">
  <label>${t("envvars")}</label><textarea id="py_env" style="width:100%;height:90px;font-family:monospace;font-size:12px;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px" placeholder="DJANGO_SETTINGS_MODULE=myproject.settings"></textarea>
  <p class="muted" style="font-size:12px">${t("pyapphint")}</p>
  <div style="margin-top:14px"><button class="primary" onclick="pyCreate()">${t("deploy")}</button></div>`)}
async function pyCreate(){try{const r=await api("/api/pyapps",{method:"POST",body:JSON.stringify({
  name:$("py_name").value,domain:$("py_domain").value,repo_url:$("py_repo").value,branch:$("py_branch").value||"main",
  app_type:$("py_type").value,entry:$("py_entry").value,env_vars:$("py_env").value,python_version:$("py_ver").value||null})});
  closeModal();alert("OK\n"+((r.build_log||[]).join("\n")));viewPyapps()}catch(e){toast(e.message,"err")}}
async function pyDeploy(id){try{const r=await api(`/api/pyapps/${id}/deploy`,{method:"POST"});alert((r.build_log||[]).join("\n"));viewPyapps()}catch(e){toast(e.message,"err")}}
async function pyCtl(id,action){try{await api(`/api/pyapps/${id}/control`,{method:"POST",body:JSON.stringify({action})});toast(t("saved"),"ok");viewPyapps()}catch(e){toast(e.message,"err")}}
async function pyLogs(id){try{const r=await api(`/api/pyapps/${id}/logs?lines=200`);modal(`<h3>${t("applogs")}: ${esc(r.name)}</h3><pre style="max-height:60vh">${esc(r.content)}</pre>`)}catch(e){toast(e.message,"err")}}
async function pyDel(id){if(!confirm(t("confirmdel")))return;const rm=confirm(t("removefiles"));
  try{await api(`/api/pyapps/${id}?remove_files=${rm}`,{method:"DELETE"});viewPyapps()}catch(e){toast(e.message,"err")}}
async function pyTemplateForm(){let tpls=[];try{tpls=(await api("/api/pyapps/templates")).templates}catch(e){toast(e.message,"err");return}
  modal(`<h3>⚡ ${t("fromtemplate")}</h3>
  <div class="row2"><div><label>${t("reponame")}</label><input id="tp_name" placeholder="myapi"></div><div><label>${t("domain")}</label><input id="tp_domain" placeholder="api.example.ir"></div></div>
  <label>${t("selecttemplate")}</label><select id="tp_tpl">${tpls.map(x=>`<option value="${esc(x.id)}">${esc(x.label)} — ${esc(x.desc)}</option>`).join("")}</select>
  <label>${t("pyver")}</label><input id="tp_ver" placeholder="3.11">
  <label>${t("envvars")}</label><textarea id="tp_env" style="width:100%;height:70px;font-family:monospace;font-size:12px;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px"></textarea>
  <div style="margin-top:14px"><button class="primary" onclick="pyTemplateCreate()">${t("create")}</button></div>`)}
async function pyTemplateCreate(){try{const r=await api("/api/pyapps/template",{method:"POST",body:JSON.stringify({
  name:$("tp_name").value,domain:$("tp_domain").value,template:$("tp_tpl").value,
  env_vars:$("tp_env").value,python_version:$("tp_ver").value||null})});
  closeModal();alert("OK\n"+((r.build_log||[]).join("\n")));viewPyapps()}catch(e){toast(e.message,"err")}}
async function pyWebhook(id){try{const r=await api(`/api/pyapps/${id}/webhook-info`);
  const url=location.origin+r.path;
  modal(`<h3>🔗 ${t("ghwebhook")}: ${esc(r.name)}</h3>
  <p class="muted" style="font-size:12px">${t("webhookdesc")}</p>
  <label>${t("webhookurl")}</label><input readonly value="${esc(url)}" onclick="this.select()">
  <label>${t("secretlbl")}</label><input readonly value="${esc(r.secret)}" onclick="this.select()">
  <p class="muted" style="font-size:12px">branch: <code>${esc(r.branch)}</code> · event: push</p>
  <div style="margin-top:12px"><button class="danger" onclick="pyRegen(${id})">${t("regen")}</button></div>`)}
  catch(e){toast(e.message,"err")}}
async function pyRegen(id){if(!confirm(t("regen")+"؟"))return;try{await api(`/api/pyapps/${id}/webhook-regenerate`,{method:"POST"});closeModal();pyWebhook(id)}catch(e){toast(e.message,"err")}}

// ---- modal ----
function modal(html){const bg=document.createElement("div");bg.className="modal-bg";bg.id="modalBg";
  bg.innerHTML=`<div class="modal">${html}<div style="margin-top:14px"><button onclick="closeModal()">✕</button></div></div>`;
  bg.addEventListener("click",e=>{if(e.target===bg)closeModal()});document.body.appendChild(bg)}
function closeModal(){const m=$("modalBg");if(m)m.remove()}

// ---- boot ----
applyLang();
if(token){showApp()}else{document.getElementById("login").classList.remove("hidden")}
document.getElementById("li_pass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
</script>
